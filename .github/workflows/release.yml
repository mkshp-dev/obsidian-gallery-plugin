name: Release plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$tag" != "$manifest_version" ]; then
            echo "ERROR: Tag '$tag' does not match manifest.json version '$manifest_version'"
            exit 1
          fi

      - name: Attest build provenance for main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Attest build provenance for styles.css
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
